<!DOCTYPE html>
<html>
<head>
<title>Chat SaaS</title>

<style>
body{
margin:0;
font-family:Arial;
background:#dadbd3;
}

/* CONTENEDOR */
#app{
display:flex;
height:100vh;
}

/* SIDEBAR */
#sidebar{
width:30%;
background:#111b21;
color:white;
display:flex;
flex-direction:column;
}

#usuario-header{
padding:15px;
background:#202c33;
font-weight:bold;
}

#usuarios{
flex:1;
overflow-y:auto;
}

.usuario{
padding:15px;
border-bottom:1px solid #2a3942;
cursor:pointer;
}

.usuario:hover{
background:#2a3942;
}

.activo{
background:#2a3942;
}

/* CHAT */
#chat{
flex:1;
display:flex;
flex-direction:column;
background:#efeae2;
}

/* HEADER */
#chat-header{
background:#202c33;
color:white;
padding:15px;
}

/* MENSAJES */
#mensajes{
flex:1;
padding:15px;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:10px;
}

.mensaje{
max-width:60%;
padding:10px;
border-radius:10px;
}

.mio{
background:#d9fdd3;
align-self:flex-end;
}

.otro{
background:white;
align-self:flex-start;
}

/* INPUT */
#input-area{
display:flex;
padding:10px;
background:#202c33;
}

#mensaje{
flex:1;
padding:10px;
border-radius:20px;
border:none;
outline:none;
}

button{
margin-left:5px;
padding:10px;
border:none;
background:#00a884;
color:white;
border-radius:50%;
cursor:pointer;
}

/* LOGIN */
#login{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:20px;
border-radius:10px;
display:flex;
flex-direction:column;
gap:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<h3>Login</h3>
<input id="user" placeholder="Usuario">
<input id="pass" type="password" placeholder="Contraseña">
<button onclick="login()">Entrar</button>
<button onclick="registro()">Registrarse</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<!-- SIDEBAR -->
<div id="sidebar">
  <div id="usuario-header">👤 <span id="usuario"></span></div>
  <div id="usuarios"></div>
</div>

<!-- CHAT -->
<div id="chat">
  <div id="chat-header">Selecciona un chat</div>
  <div id="mensajes"></div>

  <div id="input-area">
    <input id="mensaje" placeholder="Escribe un mensaje">
    <button onclick="enviar()">➤</button>
  </div>
</div>

</div>

<script>

const API = "";
let usuarioActual = "";
let chatActual = null;

// LOGIN
async function login(){
  const username = user.value;
  const password = pass.value;

  const res = await fetch("/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({username, password})
  });

  if(res.ok){
    usuarioActual = username;

    document.getElementById("usuario").innerText = username;
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="flex";

    cargarUsuarios();
  } else {
    alert("Error login");
  }
}

// REGISTRO
async function registro(){
  const username = user.value;
  const password = pass.value;

  const res = await fetch("/registro",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({username, password})
  });

  if(res.ok){
    alert("Usuario creado");
  } else {
    alert("Error");
  }
}

// CARGAR USUARIOS (SIDEBAR)
async function cargarUsuarios(){
  const res = await fetch("/usuarios");
  const data = await res.json();

  const cont = document.getElementById("usuarios");
  cont.innerHTML="";

  // GLOBAL
  cont.innerHTML += `
    <div class="usuario activo" onclick="abrirChat(null,this)">
      🌍 Chat global
    </div>
  `;

  data.forEach(u=>{
    if(u.username !== usuarioActual){
      cont.innerHTML += `
        <div class="usuario" onclick="abrirChat('${u.username}',this)">
          👤 ${u.username}
        </div>
      `;
    }
  });
}

// ABRIR CHAT
function abrirChat(usuario, elemento){

  chatActual = usuario;

  document.querySelectorAll(".usuario").forEach(u=>u.classList.remove("activo"));
  elemento.classList.add("activo");

  document.getElementById("chat-header").innerText =
    usuario ? "Chat con " + usuario : "Chat global";

  cargarMensajes();
}

// CARGAR MENSAJES
async function cargarMensajes(){

  const res = await fetch("/mensajes/" + usuarioActual);
  const data = await res.json();

  const cont = document.getElementById("mensajes");
  cont.innerHTML="";

  data.forEach(m=>{

    if(chatActual){
      if(!(
        (m.de === usuarioActual && m.para === chatActual) ||
        (m.de === chatActual && m.para === usuarioActual)
      )) return;
    } else {
      if(m.para !== null) return;
    }

    const tipo = m.de === usuarioActual ? "mio" : "otro";

    cont.innerHTML += `
      <div class="mensaje ${tipo}">
        <b>${m.de}</b><br>
        ${m.mensaje}
      </div>
    `;
  });

  cont.scrollTop = cont.scrollHeight;
}

// ENVIAR
async function enviar(){

  const mensaje = document.getElementById("mensaje").value;

  await fetch("/mensaje",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      de: usuarioActual,
      para: chatActual,
      mensaje
    })
  });

  document.getElementById("mensaje").value="";
  cargarMensajes();
}

// ENTER
document.getElementById("mensaje").addEventListener("keypress", e=>{
  if(e.key==="Enter") enviar();
});

// REFRESH
setInterval(()=>{
  if(usuarioActual && chatActual !== undefined){
    cargarMensajes();
  }
},1000);

</script>

</body>
</html>
